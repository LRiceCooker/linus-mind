<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A literary reading experience for Linus Torvalds' commit messages">
  <meta name="theme-color" content="#f8f6f1" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1a1916" media="(prefers-color-scheme: dark)">
  <link rel="preconnect" href="https://api.github.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <title>linus-mind</title>
</head>
<body>
  <a href="#main-content" class="sr-only sr-only-focusable">Skip to content</a>

  <!-- Repository Index View -->
  <div id="repo-view" class="view">
    <header class="hero">
      <h1 class="hero-title">linus-mind</h1>
      <p class="hero-tagline">reading the mind of linus torvalds, one commit at a time.</p>
      <div class="dinkus" aria-hidden="true">&middot;  &middot;  &middot;</div>
    </header>
    <main id="main-content">
      <section class="repo-list" aria-label="Repositories"></section>
    </main>
  </div>

  <!-- Commit Reader View -->
  <div id="reader-view" class="view" hidden>
    <div class="progress-bar" role="progressbar" aria-label="Reading progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>
    <nav class="top-bar">
      <button class="back-button" aria-label="Back to repositories">&larr;</button>
      <span class="top-bar-title"></span>
    </nav>
    <div class="scroll-container"></div>
  </div>

  <div id="rate-limit-bar" style="display: none;" role="status"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
